name: Daily Ratings Dashboard Update

on:
  schedule:
    # 한국 시간 기준 오전 8:15, 9:15, 10:15에 세 번 실행되도록 설정
    # 하나가 지연되더라도 다음 스케줄이 보완해줍니다.
    - cron: '15 23 * * *' # 08:15 KST
    - cron: '15 00 * * *' # 09:15 KST
    - cron: '15 01 * * *' # 10:15 KST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 저장소에 파일을 쓸 수 있는 권한을 부여합니다 (중요!)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .  # 모든 변경사항(history 폴더 포함)을 추가하도록 변경
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ratings and history" && git push)

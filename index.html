<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TV 시청률 아카이브 & 트렌드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #333; margin: 0; }
        
        /* 달력 스타일 */
        .date-selector { display: flex; align-items: center; gap: 10px; background: #eee; padding: 8px 15px; border-radius: 8px; }
        .date-selector label { font-size: 0.85rem; font-weight: bold; color: #555; }
        #date-picker { border: 1px solid #ccc; border-radius: 4px; padding: 5px; font-family: inherit; }

        #status-bar { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 500; text-align: center; }
        .update { text-align: right; color: #999; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; font-size: 1rem; font-weight: bold; color: #666; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; color: #666; font-weight: 600; }
        tbody tr { cursor: pointer; transition: 0.2s; }
        tbody tr:hover { background: #f1f8ff; }
        .rank { font-weight: bold; color: var(--primary); width: 40px; }
        .rate { font-weight: bold; color: #e74c3c; text-align: right; }

        #chart-container { display: none; margin-top: 40px; padding: 20px; border: 1px solid #eee; border-radius: 12px; background: #fff; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { cursor: pointer; border: none; background: #666; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>📺 TV 시청률 아카이브</h1>
        <div class="date-selector">
            <label for="date-picker">날짜 이동:</label>
            <input type="date" id="date-picker" onchange="handleDateChange(this.value)">
        </div>
    </div>
    
    <div id="status-bar">데이터를 로드 중입니다...</div>
    <p class="update">조회 중인 데이터 시간: <span id="time">-</span></p>

    <div class="tabs">
        <button class="tab-btn active" id="btn-terrestrial" onclick="changeTab('terrestrial', this)">지상파</button>
        <button class="tab-btn" onclick="changeTab('comprehensive', this)">종편</button>
        <button class="tab-btn" onclick="changeTab('cable', this)">케이블</button>
    </div>

    <table id="rating-table">
        <thead>
            <tr><th>순위</th><th>프로그램</th><th>채널</th><th style="text-align:right;">시청률</th></tr>
        </thead>
        <tbody id="content"></tbody>
    </table>

    <div id="chart-container">
        <div class="chart-header">
            <h3 id="chart-title">트렌드 분석</h3>
            <button class="close-btn" onclick="closeChart()">닫기</button>
        </div>
        <div style="height:300px;"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<script>
    let allHistory = {}; 
    let currentViewData = {}; 
    let currentCategory = 'terrestrial';
    let myChart = null;

    function normalizeName(name) {
        return name.replace(/\(\w+\)/g, '').replace(/\d+부/g, '').trim();
    }

    async function init() {
        try {
            const res = await fetch('all_ratings.json?v=' + Date.now());
            allHistory = await res.json();
            
            // 저장된 날짜 중 가장 최신 날짜 찾기
            const dates = Object.keys(allHistory).sort().reverse();
            const latestDate = dates[0];

            // 달력 기본값 세팅
            document.getElementById('date-picker').value = latestDate;
            
            // 데이터 로드
            loadDataByDate(latestDate);
        } catch (err) {
            document.getElementById('status-bar').innerHTML = "❌ 데이터를 불러올 수 없습니다.";
        }
    }

    // 날짜를 선택했을 때 실행되는 함수
    function handleDateChange(selectedDate) {
        if (allHistory[selectedDate]) {
            loadDataByDate(selectedDate);
        } else {
            alert(selectedDate + "의 데이터가 존재하지 않습니다.");
            // 데이터가 있는 가장 가까운 날짜로 복구하거나 그대로 둠
        }
    }

    function loadDataByDate(dateStr) {
        currentViewData = allHistory[dateStr];
        document.getElementById('time').innerText = currentViewData.date;
        
        // 상태 표시 업데이트
        const statusBar = document.getElementById('status-bar');
        statusBar.style.display = 'block';
        statusBar.style.background = '#e9ecef';
        statusBar.style.color = '#495057';
        statusBar.innerHTML = `📅 <strong>${dateStr}</strong> 수집 데이터를 조회 중입니다.`;

        renderTable(currentCategory);
        closeChart(); // 날짜 이동 시 차트 닫기
    }

    function renderTable(category) {
        currentCategory = category;
        const tbody = document.getElementById('content');
        tbody.innerHTML = '';
        const list = currentViewData[category] || [];
        
        if(list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">해당 날짜에 데이터가 없습니다.</td></tr>';
            return;
        }

        list.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="rank">${item.rank}</td><td>${item.program}</td><td>${item.channel}</td><td class="rate">${item.rate}%</td>`;
            tr.onclick = () => showChart(item.program);
            tbody.appendChild(tr);
        });
    }

    // [이전 수정사항 반영] 그래프 바닥으로 떨어지는 현상 방지 로직 유지
    function showChart(programName) {
        const container = document.getElementById('chart-container');
        container.style.display = 'block';
        document.getElementById('chart-title').innerText = `📈 ${programName} 추이 (기록된 날짜만)`;

        const normalizedTarget = normalizeName(programName);
        const sortedDates = Object.keys(allHistory).sort();
        
        const labels = [];
        const chartData = [];

        sortedDates.forEach(date => {
            const dayAll = [
                ...(allHistory[date].terrestrial || []),
                ...(allHistory[date].comprehensive || []),
                ...(allHistory[date].cable || [])
            ];
            const match = dayAll.find(i => normalizeName(i.program) === normalizedTarget);
            
            if (match && match.rate) {
                labels.push(date.split('-').slice(1).join('/'));
                chartData.push(parseFloat(match.rate));
            }
        });

        if (chartData.length === 0) {
            alert("순위권 내 누적 데이터가 없습니다.");
            return;
        }
        drawChart(labels, chartData);
        container.scrollIntoView({ behavior: 'smooth' });
    }

    function drawChart(labels, data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '시청률 (%)',
                    data: data,
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.1)',
                    borderWidth: 3,
                    pointRadius: 6,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: false, suggestedMin: Math.min(...data) - 0.5 },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function changeTab(category, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable(category);
    }

    function closeChart() { document.getElementById('chart-container').style.display = 'none'; }

    init();
</script>
</body>
</html>

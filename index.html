<div class="container">
    <h1>📺 일일 시청률 TOP 20</h1>
    
    <div id="status-bar" style="padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; display: none;">
        </div>

    <p class="update">
        최근 업데이트: <span id="time">-</span> 
        <a href="https://github.com/johnwoopark-cloud/fictorial-guide/actions" target="_blank" style="margin-left:10px; font-size:0.8rem; color:#007bff; text-decoration:none;">[데이터 강제 업데이트 요청]</a>
    </p>

    </div>

<script>
    function loadData() {
        fetch('data.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const updateTime = new Date(data.date);
                const now = new Date();
                const diffHours = (now - updateTime) / (1000 * 60 * 60);

                const statusBar = document.getElementById('status-bar');
                statusBar.style.display = 'block';

                // 데이터가 24시간 이상 지났을 경우 경고 표시
                if (diffHours > 24) {
                    statusBar.style.background = '#fff3cd';
                    statusBar.style.color = '#856404';
                    statusBar.innerHTML = '⚠️ 현재 표시되는 데이터가 24시간 전 자료입니다. 위 [강제 업데이트] 링크를 눌러주세요.';
                } else {
                    statusBar.style.background = '#d4edda';
                    statusBar.style.color = '#155724';
                    statusBar.innerHTML = '✅ 최신 시청률 데이터가 정상적으로 로드되었습니다.';
                }

                allData = data;
                document.getElementById('time').innerText = data.date;
                renderTable('terrestrial');
            });
    }
    // ... 나머지 함수들 ...
</script>
